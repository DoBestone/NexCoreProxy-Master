name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # === Master 后端（主控） ===
  build-master:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build master
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VER="${{ github.ref_name }}"
          VER="${VER#v}"  # 去掉 tag 前的 v，代码里 Printf("v%s") 会再加上
          go build -trimpath \
            -ldflags="-s -w -X main.version=$VER -X main.buildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o nexcore-master-${{ matrix.goos }}-${{ matrix.goarch }} .
      - uses: actions/upload-artifact@v4
        with:
          name: nexcore-master-${{ matrix.goos }}-${{ matrix.goarch }}
          path: nexcore-master-${{ matrix.goos }}-${{ matrix.goarch }}

  # === ncp-agent（节点代理，独立 Go module） ===
  build-agent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: Agent/go.mod
      - name: Build ncp-agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        working-directory: Agent
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o ../ncp-agent-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/ncp-agent
      - uses: actions/upload-artifact@v4
        with:
          name: ncp-agent-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ncp-agent-${{ matrix.goos }}-${{ matrix.goarch }}

  # === Vue 前端 ===
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build Frontend
        run: |
          cd web
          npm ci
          npm run build
      - name: Package Frontend
        run: tar -czf frontend-dist.tar.gz -C web/dist .
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

  release:
    needs: [build-master, build-agent, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release files
        run: |
          mkdir -p release
          # master 后端二进制
          for dir in artifacts/nexcore-master-*/; do
            cp "$dir"/* release/
          done
          # ncp-agent 二进制
          for dir in artifacts/ncp-agent-*/; do
            cp "$dir"/* release/
          done
          # 前端
          cp artifacts/frontend-dist/frontend-dist.tar.gz release/
          # 脚本
          [ -f update.sh ] && cp update.sh release/
          [ -f Agent/install-agent.sh ] && cp Agent/install-agent.sh release/
          chmod +x release/nexcore-master-* release/ncp-agent-* release/*.sh 2>/dev/null || true
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            release/nexcore-master-linux-amd64
            release/nexcore-master-linux-arm64
            release/ncp-agent-linux-amd64
            release/ncp-agent-linux-arm64
            release/frontend-dist.tar.gz
            release/install-agent.sh
            release/update.sh
          generate_release_notes: true
